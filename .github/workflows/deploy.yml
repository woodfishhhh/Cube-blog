name: Deploy Next.js to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        timeout-minutes: 15

      - name: Package build files
        run: |
          tar --exclude='.next/cache' \
              --exclude='.next/turbo' \
              --exclude='.next/server/middleware-manifest.json' \
              --exclude='.next/server/next-font-manifest.json' \
              --exclude='.next/server/third-party-manifest.json' \
              --exclude='.next/**/*.map' \
              --exclude='node_modules' \
              --exclude='.git' \
              --exclude='*.log' \
              -czf deploy.tar.gz .next public content package.json package-lock.json next.config.ts

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "${{ secrets.DEPLOY_DIR }}/"
          timeout: 10m

      - name: Extract and restart
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 5m
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            tar -xzf deploy.tar.gz && rm -f deploy.tar.gz
            chmod -R 755 .
            pm2 restart 3dblog || pm2 start npm --name "3dblog" -- start
            pm2 save
