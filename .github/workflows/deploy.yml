name: Deploy Next.js to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        timeout-minutes: 15

      - name: Create deployment package
        run: |
          mkdir deploy-package
          cp -r .next public content package.json package-lock.json next.config.ts deploy-package/
          cd deploy-package
          # 最小化打包，只传必要文件
          tar --sort=name --mtime="@0" --owner=0 --group=0 --numeric-owner -czf ../deploy.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package
          path: ./

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "${{ secrets.DEPLOY_DIR }}/"
          timeout: 10m

      - name: Extract and restart
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 5m
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            tar -xzf deploy.tar.gz && rm -f deploy.tar.gz
            chmod -R 755 .
            pm2 restart 3dblog || pm2 start npm --name "3dblog" -- start
            pm2 save
