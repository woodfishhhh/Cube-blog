name: Deploy Next.js to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        timeout-minutes: 15

      - name: Package build files
        run: |
          cd /github/workspace
          zip -r deploy.zip .next public package.json package-lock.json next.config.ts

      - name: Upload zip to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.zip"
          target: "${{ secrets.DEPLOY_DIR }}/"
          timeout: 10m

      - name: Extract and restart
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 5m
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            unzip -o deploy.zip && rm -f deploy.zip
            chmod -R 755 .
            pm2 restart 3dblog || pm2 start npm --name "3dblog" -- start
            pm2 save
