name: Deploy Next.js to CentOS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      # 只打包生产必需文件
      - name: Package build files
        run: zip -r deploy.zip .next public package.json package-lock.json

      # 上传到服务器
      - name: Upload to CentOS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.zip"
          target: ${{ secrets.DEPLOY_DIR }}

      # 服务器部署（无 Nginx，纯 Next.js）
      - name: Deploy & Restart
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            unzip -o deploy.zip
            rm -f deploy.zip

            # 安装生产依赖
            npm ci --only=production

            # PM2 重启/启动 Next.js
            pm2 restart 3dblog || pm2 start npm --name "3dblog" -- start

            # 权限（CentOS 通用）
            chmod -R 755 ${{ secrets.DEPLOY_DIR }}
