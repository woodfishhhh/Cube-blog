          - heading "输入和输出" [level=3] [ref=e350]
          - paragraph [ref=e351]: 输出和输入也可理解为人和计算机的交互，用户通过键盘、鼠标等向计算机输入信息，计算机处理后再展示结果给用户，这便是一次输入和输出的过程。
          - paragraph [ref=e352]: 举例说明：如按键盘上的方向键，向上/下键可以滚动页面，按向上/下键这个动作叫作输入，页面发生了滚动了这便叫输出。
          - heading "输出" [level=4] [ref=e353]
          - paragraph [ref=e354]: JavaScript 可以接收用户的输入，然后再将输入的结果输出：
          - paragraph [ref=e355]:
            - code [ref=e356]: alert()
            - text: 、
            - code [ref=e357]: document.wirte()
          - paragraph [ref=e358]:
            - text: 以数字为例，向
            - code [ref=e359]: alert()
            - text: 或
            - code [ref=e360]: document.write()
            - text: 输入任意数字，他都会以弹窗形式展示（输出）给用户。
          - heading "输入" [level=4] [ref=e361]
          - paragraph [ref=e362]:
            - text: 向
            - code [ref=e363]: prompt()
            - text: 输入任意内容会以弹窗形式出现在浏览器中，一般提示用户输入一些内容。
          - code [ref=e365]: <script> // 1. 输入的任意数字，都会以弹窗形式展示 document.write('要输出的内容') alert('要输出的内容'); // 2. 以弹窗形式提示用户输入姓名，注意这里的文字使用英文的引号 prompt('请输入您的姓名:') </script>
          - heading "变量" [level=2] [ref=e366]
          - blockquote [ref=e367]:
            - paragraph [ref=e368]: 理解变量是计算机存储数据的“容器”，掌握变量的声明方式
          - paragraph [ref=e369]: 变量是计算机中用来存储数据的“容器”，它可以让计算机变得有记忆，通俗的理解变量就是使用【某个符号】来代表【某个具体的数值】（数据）
          - code [ref=e371]: <script> // x 符号代表了 5 这个数值 x = 5 // y 符号代表了 6 这个数值 y = 6 //举例： 在 JavaScript 中使用变量可以将某个数据（数值）记录下来！ // 将用户输入的内容保存在 num 这个变量（容器）中 num = prompt('请输入一数字!') alert(num) document.write(num) </script>
          - heading "声明" [level=3] [ref=e372]
          - paragraph [ref=e373]: 声明(定义)变量有两部分构成：声明关键字、变量名（标识）
          - code [ref=e375]: <script> // let 变量名 // 声明(定义)变量有两部分构成：声明关键字、变量名（标识） // let 即关键字，所谓关键字是系统提供的专门用来声明（定义）变量的词语 // age 即变量的名称，也叫标识符 let age </script>
          - paragraph [ref=e376]:
            - text: 关键字是 JavaScript 中内置的一些英文词汇（单词或缩写），它们代表某些特定的含义，如
            - code [ref=e377]: let
            - text: 的含义是声明变量的，看到
            - code [ref=e378]: let
            - text: 后就可想到这行代码的意思是在声明变量，如
            - code [ref=e379]: let age;
          - paragraph [ref=e380]:
            - code [ref=e381]: let
            - text: 和
            - code [ref=e382]: var
            - text: 都是 JavaScript 中的声明变量的关键字，推荐使用
            - code [ref=e383]: let
            - text: 声明变量！！！
          - heading "赋值" [level=3] [ref=e384]
          - paragraph [ref=e385]: 声明（定义）变量相当于创造了一个空的“容器”，通过赋值向这个容器中添加数据。
          - code [ref=e387]: <script> // 声明(定义)变量有两部分构成：声明关键字、变量名（标识） // let 即关键字，所谓关键字是系统提供的专门用来声明（定义）变量的词语 // age 即变量的名称，也叫标识符 let age // 赋值，将 18 这个数据存入了 age 这个“容器”中 age = 18 // 这样 age 的值就成了 18 document.write(age) // 也可以声明和赋值同时进行 let str = 'hello world!' alert(str); </script>
          - heading "关键字" [level=3] [ref=e388]
          - paragraph [ref=e389]:
            - text: JavaScript 使用专门的关键字
            - code [ref=e390]: let
            - text: 和
            - code [ref=e391]: var
            - text: 来声明（定义）变量，在使用时需要注意一些细节：
          - paragraph [ref=e392]:
            - text: 以下是使用
            - code [ref=e393]: let
            - text: 时的注意事项：
          - list [ref=e394]:
            - listitem [ref=e395]: 允许声明和赋值同时进行
            - listitem [ref=e396]: 不允许重复声明
            - listitem [ref=e397]: 允许同时声明多个变量并赋值
            - listitem [ref=e398]: JavaScript 中内置的一些关键字不能被当做变量名
          - paragraph [ref=e399]:
            - text: 以下是使用
            - code [ref=e400]: var
            - text: 时的注意事项：
          - list [ref=e401]:
            - listitem [ref=e402]: 允许声明和赋值同时进行
            - listitem [ref=e403]: 允许重复声明
            - listitem [ref=e404]: 允许同时声明多个变量并赋值
          - paragraph [ref=e405]:
            - text: 大部分情况使用
            - code [ref=e406]: let
            - text: 和
            - code [ref=e407]: var
            - text: 区别不大，但是
            - code [ref=e408]: let
            - text: 相较
            - code [ref=e409]: var
            - text: 更严谨，因此推荐使用
            - code [ref=e410]: let
            - text: ，后期会更进一步介绍二者间的区别。
          - heading "变量名命名规则" [level=3] [ref=e411]
          - paragraph [ref=e412]: 关于变量的名称（标识符）有一系列的规则需要遵守：
          - list [ref=e413]:
            - listitem [ref=e414]: 只能是字母、数字、下划线、$，且不能能数字开头
            - listitem [ref=e415]: 字母区分大小写，如 Age 和 age 是不同的变量
            - listitem [ref=e416]: JavaScript 内部已占用于单词（关键字或保留字）不允许使用
            - listitem [ref=e417]: 尽量保证变量具有一定的语义，见字知义
          - paragraph [ref=e418]:
            - text: 注：所谓关键字是指 JavaScript 内部使用的词语，如
            - code [ref=e419]: let
            - text: 和
            - code [ref=e420]: var
            - text: ，保留字是指 JavaScript 内部目前没有使用的词语，但是将来可能会使用词语。
          - code [ref=e422]: <script> let age = 18 // 正确 let age1 = 18 // 正确 let _age = 18 // 正确 // let 1age = 18; // 错误，不可以数字开头 let $age = 18 // 正确 let Age = 24 // 正确，它与小写的 age 是不同的变量 // let let = 18; // 错误，let 是关键字 let int = 123 // 不推荐，int 是保留字 </script>
          - heading "常量" [level=2] [ref=e423]
          - paragraph [ref=e424]: 概念：使用 const 声明的变量称为“常量”。
          - paragraph [ref=e425]: 使用场景：当某个变量永远不会改变的时候，就可以使用 const 来声明，而不是let。
          - paragraph [ref=e426]: 命名规范：和变量一致
          - code [ref=e428]: const PI = 3.14
          - blockquote [ref=e429]:
            - paragraph [ref=e430]: 注意： 常量不允许重新赋值,声明的时候必须赋值（初始化）
          - heading "数据类型" [level=2] [ref=e431]
          - blockquote [ref=e432]:
            - paragraph [ref=e433]: 计算机世界中的万事成物都是数据。
          - paragraph [ref=e434]: 计算机程序可以处理大量的数据，为了方便数据的管理，将数据分成了不同的类型：
          - paragraph [ref=e435]: 注：通过 typeof 关键字检测数据类型
          - code [ref=e437]: <script> // 检测 1 是什么类型数据，结果为 number document.write(typeof 1) </script>
          - heading "数值类型" [level=3] [ref=e438]
          - paragraph [ref=e439]: 即我们数学中学习到的数字，可以是整数、小数、正数、负数
          - code [ref=e441]: <script> let score = 100 // 正整数 let price = 12.345 // 小数 let temperature = -40 // 负数 document.write(typeof score) // 结果为 number document.write(typeof price) // 结果为 number document.write(typeof temperature) // 结果为 number </script>
          - paragraph [ref=e442]: JavaScript 中的数值类型与数学中的数字是一样的，分为正数、负数、小数等。
          - heading "字符串类型" [level=3] [ref=e443]
          - paragraph [ref=e444]:
            - text: 通过单引号（
            - code [ref=e445]: "''"
            - text: ） 、双引号（
            - code [ref=e446]: "\"\""
            - text: ）或反引号包裹的数据都叫字符串，单引号和双引号没有本质上的区别，推荐使用单引号。
          - paragraph [ref=e447]: 注意事项：
          - list [ref=e448]:
            - listitem [ref=e449]: 无论单引号或是双引号必须成对使用
            - listitem [ref=e450]: 单引号/双引号可以互相嵌套，但是不以自已嵌套自已
            - listitem [ref=e451]:
              - text: 必要时可以使用转义符
              - code [ref=e452]: \
              - text: ，输出单引号或双引号
          - code [ref=e454]: <script> let user_name = '小明' // 使用单引号 let gender = "男" // 使用双引号 let str = '123' // 看上去是数字，但是用引号包裹了就成了字符串了 let str1 = '' // 这种情况叫空字符串 documeent.write(typeof user_name) // 结果为 string documeent.write(typeof gender) // 结果为 string documeent.write(typeof str) // 结果为 string </script>
          - heading "布尔类型" [level=3] [ref=e455]
          - paragraph [ref=e456]:
            - text: 表示肯定或否定时在计算机中对应的是布尔类型数据，它有两个固定的值
            - code [ref=e457]: "true"
            - text: 和
            - code [ref=e458]: "false"
            - text: ，表示肯定的数据用
            - code [ref=e459]: "true"
            - text: ，表示否定的数据用
            - code [ref=e460]: "false"
            - text: 。
          - code [ref=e462]: <script> // pink老师帅不帅？回答 是 或 否 let isCool = true // 是的，摔死了！ isCool = false // 不，套马杆的汉子！ document.write(typeof isCool) // 结果为 boolean </script>
          - heading "undefined" [level=3] [ref=e463]
          - paragraph [ref=e464]: 未定义是比较特殊的类型，只有一个值 undefined，只声明变量，不赋值的情况下，变量的默认值为 undefined，一般很少【直接】为某个变量赋值为 undefined。
          - code [ref=e466]: <script> // 只声明了变量，并末赋值 let tmp; document.write(typeof tmp) // 结果为 undefined </script>
          - paragraph [ref=e467]:
            - strong [ref=e468]: 注：JavaScript 中变量的值决定了变量的数据类型。
          - heading "类型转换" [level=2] [ref=e469]
          - blockquote [ref=e470]:
            - paragraph [ref=e471]: 理解弱类型语言的特征，掌握显式类型转换的方法
          - paragraph [ref=e472]: 在 JavaScript 中数据被分成了不同的类型，如数值、字符串、布尔值、undefined，在实际编程的过程中，不同数据类型之间存在着转换的关系。
          - heading "隐式转换" [level=3] [ref=e473]
          - paragraph [ref=e474]: 某些运算符被执行时，系统内部自动将数据类型进行转换，这种转换称为隐式转换。
          - code [ref=e476]: <script> let num = 13 // 数值 let num2 = '2' // 字符串 // 结果为 132 // 原因是将数值 num 转换成了字符串，相当于 '13' // 然后 + 将两个字符串拼接到了一起 console.log(num + num2) // 结果为 11 // 原因是将字符串 num2 转换成了数值，相当于 2 // 然后数值 13 减去 数值 2 console.log(num - num2) let a = prompt('请输入一个数字') let b = prompt('请再输入一个数字') alert(a + b); </script>
          - paragraph [ref=e477]: 注：数据类型的隐式转换是 JavaScript 的特征，后续学习中还会遇到，目前先需要理解什么是隐式转换。
          - heading "模版字符串" [level=3] [ref=e478]
          - paragraph [ref=e479]:
            - text: 使用反引号（1边上的那个）包裹字符串，通过
            - code [ref=e480]: "${expression}"
            - text: 嵌入变量或表达式。
          - code [ref=e482]: "const name = \"Alice\"; const age = 30; // 基本拼接 const greeting = `Hello, ${name}! You are ${age} years old.`; console.log(greeting); // 输出：\"Hello, Alice! You are 30 years old.\" // 支持表达式计算 const total = `Total: $${100 + 50}`; console.log(total); // 输出：\"Total: $150\""
          - heading "显式转换" [level=3] [ref=e483]
          - paragraph [ref=e484]: 编写程序时过度依靠系统内部的隐式转换是不严禁的，因为隐式转换规律并不清晰，大多是靠经验总结的规律。为了避免因隐式转换带来的问题，通常根逻辑需要对数据进行显示转换。
          - heading "Number" [level=4] [ref=e485]
          - paragraph [ref=e486]:
            - text: 通过
            - code [ref=e487]: Number
            - text: 显示转换成数值类型，当转换失败时结果为
            - code [ref=e488]: NaN
            - text: （Not a Number）即不是一个数字。
          - code [ref=e490]: <script> let t = '12' let f = 8 // 显式将字符串 12 转换成数值 12 t = Number(t) // 检测转换后的类型 // console.log(typeof t); console.log(t + f) // 结果为 20 // 并不是所有的值都可以被转成数值类型 let str = 'hello' // 将 hello 转成数值是不现实的，当无法转换成 // 数值时，得到的结果为 NaN （Not a Number） console.log(Number(str)) </script>
          - heading [level=3]
